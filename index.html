<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DayTrip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayTrip">
<meta name="theme-color" content="#0d1117">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --header:#0d1117;--headerSub:#161b22;--headerBdr:#30363d;
  --headerTxt:#e6edf3;--headerSub2:#7d8590;
  --bg:#f5f6fa;--card:#fff;--card2:#f0f2f8;--border:#e4e6ef;
  --txt:#1a1d2e;--sub:#8b90a0;--acc:#5C6BC0;--accL:#EEF0FB;
  --red:#f85149;--sun:#2188ff;--green:#2da44e;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
button{border:none;background:none;cursor:pointer;font-family:inherit;}
input{font-family:inherit;}

.hd{background:var(--header);padding:env(safe-area-inset-top) 0 0;}
.hd-inner{padding:14px 20px 16px;display:flex;justify-content:space-between;align-items:center;}
.hd-title{font-size:22px;font-weight:900;color:var(--headerTxt);letter-spacing:-.5px;}
.hd-sub{font-size:11px;color:var(--headerSub2);margin-top:2px;}
.btn-new{background:var(--acc);border-radius:12px;padding:8px 14px;
  color:#fff;font-weight:700;font-size:13px;}

.month-nav{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 8px;}
.month-nav button{font-size:24px;color:var(--txt);padding:4px 8px;}
.month-nav span{font-size:17px;font-weight:800;color:var(--txt);}

.cal-card{margin:0 16px;background:var(--card);border-radius:20px;
  overflow:hidden;border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);
  padding:10px 0;border-bottom:1px solid var(--border);}
.dow-cell{text-align:center;font-size:11px;font-weight:700;color:var(--sub);}
.dow-cell:first-child{color:var(--red);}
.dow-cell:last-child{color:var(--sun);}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:4px;}
.day-cell{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:50px;cursor:pointer;position:relative;}
.day-num{width:34px;height:34px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:14px;}
.day-num.today{background:var(--acc);color:#fff;font-weight:800;}
.day-num.selected{border:2px solid var(--acc);color:var(--acc);font-weight:700;}
.day-num.has-trip{font-weight:800;}
.day-num.sun{color:var(--red);}
.day-num.sat{color:var(--sun);}
.dots{position:absolute;bottom:4px;display:flex;gap:3px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--acc);}
.dot.past{background:var(--sub);}

.next-card{margin:16px 16px 0;background:var(--card);border-radius:20px;
  padding:16px;border:1.5px solid rgba(92,107,192,.4);
  box-shadow:0 3px 10px rgba(92,107,192,.1);cursor:pointer;}
.next-label{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.next-title{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:3px;}
.next-date{font-size:12px;color:var(--sub);}
.dday-badge{background:var(--accL);border-radius:14px;padding:10px 14px;
  text-align:center;border:1px solid rgba(92,107,192,.3);min-width:70px;}
.dday-text{font-size:20px;font-weight:900;color:var(--acc);line-height:1.2;}
.next-meta{display:flex;gap:12px;margin-top:10px;}
.next-meta span{font-size:11px;color:var(--sub);}

.list-section{padding:20px 16px 120px;}
.list-label{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.5px;margin-bottom:12px;}
.trip-item{background:var(--card);border-radius:16px;padding:14px;
  margin-bottom:9px;display:flex;align-items:center;gap:12px;
  border:1px solid var(--border);cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.04);}
.trip-item.past{opacity:.45;}
.trip-date-box{background:var(--accL);border-radius:12px;padding:8px 10px;text-align:center;min-width:46px;}
.trip-date-box.past{background:var(--card2);}
.trip-day{font-size:17px;font-weight:900;color:var(--acc);line-height:1.2;}
.trip-day.past{color:var(--sub);}
.trip-mon{font-size:10px;color:var(--acc);font-weight:600;}
.trip-mon.past{color:var(--sub);}
.trip-info{flex:1;}
.trip-name{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.trip-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.trip-meta span{font-size:11px;color:var(--sub);}
.status-badge{padding:2px 6px;border-radius:5px;font-size:10px;font-weight:600;}
.status-badge.upcoming{background:var(--accL);color:var(--acc);}
.status-badge.done{background:var(--card2);color:var(--sub);}
.trip-arrow{font-size:20px;color:var(--border);}

.fab{position:fixed;bottom:calc(34px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  background:var(--acc);border-radius:28px;padding:16px 30px;
  color:#fff;font-size:15px;font-weight:800;
  box-shadow:0 5px 18px rgba(92,107,192,.4);z-index:50;border:none;cursor:pointer;white-space:nowrap;}

.empty{text-align:center;padding:50px 20px;background:var(--card);
  border-radius:20px;border:1px solid var(--border);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty p{font-size:14px;color:var(--sub);}

/* TIMELINE */
.tl-hd{background:var(--header);padding:env(safe-area-inset-top) 0 0;}
.tl-hd-inner{padding:10px 16px 0;}
.tl-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.back-btn{background:var(--headerSub);border-radius:12px;padding:10px 12px;
  border:1px solid var(--headerBdr);color:var(--headerTxt);font-size:16px;}
.tl-title-wrap{flex:1;}
.tl-title{font-size:17px;font-weight:800;color:var(--headerTxt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-meta{display:flex;align-items:center;gap:7px;margin-top:3px;}
.tl-date{font-size:11px;color:var(--headerSub2);}
.tl-dday{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;}
.tl-dday.upcoming{background:rgba(92,107,192,.2);color:#a5b4fc;}
.tl-dday.past{background:rgba(255,255,255,.08);color:var(--headerSub2);}
.del-btn{background:var(--headerSub);border-radius:12px;padding:10px 12px;
  border:1px solid var(--headerBdr);font-size:14px;}
.tabs{display:flex;background:var(--headerSub);border-radius:14px;
  padding:4px;border:1px solid var(--headerBdr);}
.tab-btn{flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;color:var(--headerSub2);background:none;}
.tab-btn.active{background:var(--acc);color:#fff;}
.tabs-wrap{padding:4px 16px 0;}
.tl-body{padding:16px 16px 120px;overflow-y:auto;}
.cost-bar{background:var(--card);border-radius:14px;padding:13px 16px;
  margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;
  border:1px solid var(--border);}
.cost-bar span:first-child{font-size:13px;color:var(--acc);font-weight:600;}
.cost-bar span:last-child{font-size:17px;font-weight:900;color:var(--acc);}
.block-row{display:flex;gap:12px;}
.block-time{width:46px;padding-top:7px;text-align:right;}
.block-time .start{font-size:12px;font-weight:700;color:var(--txt);}
.block-time .end{font-size:10px;color:var(--sub);margin-top:2px;}
.block-icon-col{display:flex;flex-direction:column;align-items:center;padding-top:4px;}
.cat-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:18px;border-width:1.5px;border-style:solid;}
.block-card-wrap{flex:1;margin-bottom:8px;}
.block-card{background:var(--card);border-radius:14px;padding:13px;
  border:1px solid var(--border);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.block-card-header{display:flex;justify-content:space-between;align-items:flex-start;}
.block-place{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:5px;}
.block-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.cat-tag{padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;}
.block-dur,.block-cost{font-size:11px;color:var(--sub);}
.block-memo{font-size:12px;color:var(--sub);margin-top:6px;}
.del-block{font-size:14px;color:var(--border);padding-left:10px;background:none;border:none;cursor:pointer;}
.gap-row{display:flex;gap:12px;margin:-4px 0 2px;align-items:center;}
.gap-row .g1{width:46px;}
.gap-row .g2{width:36px;display:flex;justify-content:center;}
.gap-row .g2 .dot-line{width:2px;height:28px;background:repeating-linear-gradient(to bottom,var(--acc) 0px,var(--acc) 4px,transparent 4px,transparent 8px);border-radius:2px;margin:0 auto;}
.gap-row .g3{flex:1;padding:3px 2px;font-size:11px;color:var(--sub);font-style:italic;}
.overlap-row{display:flex;gap:12px;margin:-4px 0 4px;}
.overlap-row .o1{width:46px;}.overlap-row .o2{width:36px;}
.overlap-warn{flex:1;background:#FEF3C7;border-radius:8px;padding:6px 10px;font-size:11px;color:#92400E;font-weight:600;}

/* CHECKLIST */
.check-summary{font-size:12px;color:var(--sub);margin-bottom:14px;}
.check-item{background:var(--card);border-radius:13px;padding:14px;margin-bottom:8px;
  display:flex;align-items:center;gap:13px;border:1px solid var(--border);cursor:pointer;}
.check-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;border-width:2px;border-style:solid;}
.check-box.done{background:var(--acc);border-color:var(--acc);}
.check-box.undone{background:transparent;border-color:var(--border);}
.check-box .tick{color:#fff;font-size:12px;font-weight:800;}
.check-text{flex:1;font-size:14px;}
.check-text.done{color:var(--sub);text-decoration:line-through;}
.check-text.undone{color:var(--txt);}
.check-del{font-size:18px;color:var(--border);background:none;border:none;cursor:pointer;}
.quick-label{font-size:12px;font-weight:700;color:var(--sub);margin:18px 0 11px;}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.quick-tag{background:var(--accL);border-radius:20px;padding:8px 14px;
  border:1px solid rgba(92,107,192,.3);font-size:12px;color:var(--acc);font-weight:700;cursor:pointer;}
.check-input-row{display:flex;gap:8px;}
.check-input{flex:1;border:1.5px solid var(--border);border-radius:12px;
  padding:12px;font-size:14px;color:var(--txt);background:var(--card);}
.check-add-btn{background:var(--acc);border-radius:12px;padding:0 18px;
  color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;}
.overlay.hidden{display:none;}

/* 새 외출 일정 모달 */
.modal-sheet{
  background:var(--card);
  border-radius:28px 28px 0 0;
  width:100%;max-width:480px;
  padding:0 0 calc(60px + env(safe-area-inset-bottom));
}
.modal-handle-wrap{padding:14px 0 0;display:flex;justify-content:center;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;}
.modal-header{padding:18px 24px 0;}
.modal-header h2{font-size:20px;font-weight:900;color:var(--txt);}
.modal-body{padding:22px 24px 0;}

/* 입력 필드 그룹 */
.input-group{margin-bottom:16px;}
.input-group label{
  display:block;font-size:12px;font-weight:700;
  color:var(--sub);margin-bottom:8px;letter-spacing:.3px;}
.input-group label .hint{color:var(--acc);font-weight:600;}
.styled-input{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  font-size:15px;
  color:var(--txt);
  background:var(--bg);
  outline:none;
  transition:border-color .15s;
  -webkit-appearance:none;
  appearance:none;
}
.styled-input:focus{border-color:var(--acc);background:#fff;}
.styled-input::placeholder{color:var(--sub);}

/* 날짜 인풋 아이콘 숨기기 */
input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:.4;width:20px;height:20px;cursor:pointer;
}

/* 만들기 버튼 */
.modal-footer{padding:20px 24px 0;}
.primary-btn{
  width:100%;background:var(--acc);border-radius:16px;
  padding:16px;color:#fff;font-size:16px;font-weight:800;
  border:none;cursor:pointer;
  box-shadow:0 4px 14px rgba(92,107,192,.35);
  letter-spacing:.2px;
}

/* 블록 모달 */
.block-modal-sheet{
  background:var(--card);border-radius:28px 28px 0 0;
  width:100%;max-width:480px;
  max-height:92vh;overflow-y:auto;
  padding:0 0 calc(44px + env(safe-area-inset-bottom));
}
.block-modal-body{padding:22px 24px 0;}
.time-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
.time-field label{font-size:10px;color:var(--sub);text-align:center;display:block;margin-bottom:6px;font-weight:700;}
.time-field input{
  width:100%;border:1.5px solid var(--border);border-radius:12px;
  padding:12px 8px;font-size:15px;color:var(--txt);background:var(--bg);
  text-align:center;font-weight:700;outline:none;-webkit-appearance:none;
}
.time-field input:focus{border-color:var(--acc);background:#fff;}
.dur-preview{font-size:12px;color:var(--acc);font-weight:700;text-align:center;
  margin-bottom:16px;min-height:18px;}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.cat-btn{padding:10px 4px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--bg);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.cat-btn .cicon{font-size:20px;}
.cat-btn .clabel{font-size:9px;font-weight:700;color:var(--sub);}

/* 지나간 블록 */
.block-row.past-block{opacity:.35;}
.block-row.current-block .block-card{border-color:var(--acc);box-shadow:0 0 0 2px rgba(92,107,192,.2);}

/* 즐겨찾기 */
.fav-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.fav-chip{background:var(--accL);border:1px solid rgba(92,107,192,.3);border-radius:20px;
  padding:7px 13px;font-size:12px;color:var(--acc);font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;}
.fav-chip .fav-del{color:var(--acc);opacity:.5;font-size:14px;line-height:1;}
.fav-section-label{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:8px;margin-top:4px;}
</style>
</head>
<body>

<div id="calView">
  <div class="hd">
    <div class="hd-inner">
      <div>
        <div class="hd-title">🗺️ DayTrip</div>
        <div class="hd-sub">당일 외출 플래너</div>
      </div>
      <button class="btn-new" onclick="openNewTrip()">＋ 새 일정</button>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-card">
    <div class="dow-row">
      <div class="dow-cell">일</div><div class="dow-cell">월</div>
      <div class="dow-cell">화</div><div class="dow-cell">수</div>
      <div class="dow-cell">목</div><div class="dow-cell">금</div>
      <div class="dow-cell">토</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
  <div id="nextCard"></div>
  <div class="list-section">
    <div class="list-label">전체 외출 목록</div>
    <div id="tripList"></div>
  </div>
  <button class="fab" onclick="openNewTrip()">＋ 새 외출 일정</button>
</div>

<!-- TIMELINE VIEW -->
<div id="tlView" style="display:none;height:100vh;flex-direction:column;">
  <div class="tl-hd">
    <div class="tl-hd-inner">
      <div class="tl-top">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="tl-title-wrap">
          <div class="tl-title" id="tlTitle"></div>
          <div class="tl-meta">
            <span class="tl-date" id="tlDate"></span>
            <span class="tl-dday" id="tlDday"></span>
          </div>
        </div>
        <button class="del-btn" onclick="copyTrip()" style="margin-right:4px;">📋</button><button class="del-btn" onclick="deleteCurrentTrip()">🗑</button>
      </div>
      <div class="tabs-wrap">
        <div class="tabs">
          <button class="tab-btn active" id="tabTimeline" onclick="switchTab('timeline')">🗓 타임라인</button>
          <button class="tab-btn" id="tabChecklist" onclick="switchTab('checklist')">✅ 준비물</button>
        </div>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;">
    <div class="tl-body" id="tlContent"></div>
  </div>
  <button class="fab" id="tlFab" onclick="openAddBlock()">＋ 일정 추가</button>
</div>

<!-- 새 외출 일정 모달 -->
<div class="overlay hidden" id="newTripOverlay" onclick="closeNewTrip(event)">
  <div class="modal-sheet">
    <div class="modal-handle-wrap"><div class="modal-handle"></div></div>
    <div class="modal-header"><h2>새 외출 일정</h2></div>
    <div class="modal-body">
      <div class="input-group">
        <label>외출 제목</label>
        <input class="styled-input" id="newTripTitle" placeholder="예: 서울 병원 + 쇼핑">
      </div>
      <div class="input-group">
        <label>날짜</label>
        <input class="styled-input" id="newTripDate" type="date">
      </div>
    </div>
    <div class="modal-footer">
      <button class="primary-btn" onclick="createTrip()">만들기</button>
    </div>
  </div>
</div>

<!-- 블록 모달 -->
<div class="overlay hidden" id="blockOverlay" onclick="closeBlockModal(event)">
  <div class="block-modal-sheet" id="blockModal">
    <div class="modal-handle-wrap"><div class="modal-handle"></div></div>
    <div class="block-modal-body">
      <h2 style="font-size:20px;font-weight:900;color:var(--txt);margin-bottom:20px;" id="blockModalTitle">일정 추가</h2>

      <div class="input-group">
        <label>시간</label>
        <div class="time-row">
          <div class="time-field">
            <label>시작</label>
            <input type="time" id="bfStart" value="09:00" oninput="onStartChange()">
          </div>
          <div class="time-field">
            <label>종료</label>
            <input type="time" id="bfEnd" value="10:00" oninput="onEndChange()">
          </div>
          <div class="time-field">
            <label>소요(분)</label>
            <input type="text" id="bfDur" value="01:00" placeholder="01:00" oninput="onDurChange()" maxlength="5">
          </div>
        </div>
        <div class="dur-preview" id="durPreview">⏱ 1시간</div>
      </div>

      <div class="input-group">
        <label>장소명</label>
        <input class="styled-input" id="bfPlace" placeholder="예: 강남세브란스병원" oninput="renderFavSection()">
      <div id="favSection"></div>
      </div>

      <div class="input-group">
        <label>카테고리</label>
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <div class="input-group">
        <label>메모</label>
        <input class="styled-input" id="bfMemo" placeholder="예: KTX 101 / 7호차 15A">
      </div>

      <div class="input-group" style="margin-bottom:24px;">
        <label>예상 비용 (원)</label>
        <input class="styled-input" id="bfCost" type="number" placeholder="0">
      </div>

      <button class="primary-btn" onclick="saveBlock()" style="margin-bottom:16px;">저장</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES=[
  {id:'bus',label:'버스',icon:'🚌',color:'#4CAF50'},
  {id:'subway',label:'지하철',icon:'🚇',color:'#039BE5'},
  {id:'train',label:'기차',icon:'🚄',color:'#8E24AA'},
  {id:'walk',label:'도보',icon:'🚶',color:'#FB8C00'},
  {id:'taxi',label:'택시',icon:'🚕',color:'#F9A825'},
  {id:'car',label:'자가용',icon:'🚗',color:'#546E7A'},
  {id:'meal',label:'식사',icon:'🍽️',color:'#E53935'},

const CHECKLIST_TEMPLATES=['교통카드','신분증','수험표','우산','충전기','현금','마스크'];
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const m2t=m=>{const t=((m%1440)+1440)%1440;return`${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;};
const durStr=(s,e)=>{const d=t2m(e)-t2m(s);if(d<=0)return'';const h=Math.floor(d/60),mn=d%60;return h&&mn?`${h}시간 ${mn}분`:h?`${h}시간`:`${mn}분`;};
const fmtDate=ds=>{const d=new Date(ds+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일 (${'일월화수목금토'[d.getDay()]})`;};
const todayStr=()=>new Date().toISOString().split('T')[0];
const isFuture=ds=>ds>=todayStr();
const dDay=ds=>{const diff=Math.ceil((new Date(ds+'T00:00:00')-new Date(new Date().toDateString()))/86400000);return diff===0?'D-DAY':diff>0?`D-${diff}`:`D+${Math.abs(diff)}`;};
const cat=id=>CATEGORIES.find(c=>c.id===id)||CATEGORIES[12];

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let selTrip=null,currentTab='timeline',editBlockId=null,selCatId='etc';
let _iS=false,_iE=false,_iD=false;
const save=()=>localStorage.setItem('daytrip_v1',JSON.stringify(trips));
const sortedTrips=()=>[
  ...trips.filter(t=>isFuture(t.date)).sort((a,b)=>a.date.localeCompare(b.date)),
  ...trips.filter(t=>!isFuture(t.date)).sort((a,b)=>b.date.localeCompare(a.date)),
];

function changeMonth(d){
  calMonth+=d;

  if(calMonth>11){calMonth=0;calYear++;}

}
function renderDays(){
  const grid=document.getElementById('daysGrid');grid.innerHTML='';
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();
  const tripDates={};
  trips.forEach(t=>{if(!tripDates[t.date])tripDates[t.date]=[];tripDates[t.date].push(t);});
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day-cell';grid.appendChild(e);}
  for(let d=1;d<=total;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(first+d-1)%7;
    const ts=tripDates[ds]||[];
    const cell=document.createElement('div');cell.className='day-cell';cell.onclick=()=>goDate(ds);
    let cls='day-num';
    if(ds===today)cls+=' today';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    if(ts.length)cls+=' has-trip';
    const num=document.createElement('div');num.className=cls;num.textContent=d;
    cell.appendChild(num);
    if(ts.length){
      const dots=document.createElement('div');dots.className='dots';
      ts.slice(0,2).forEach(t=>{const dot=document.createElement('div');dot.className='dot'+(isFuture(ds)?'':' past');dots.appendChild(dot);});
      cell.appendChild(dots);
    }
    grid.appendChild(cell);
  }
}

function renderBlocks(trip,el){
  const sorted=[...trip.blocks].sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
  const tc=sorted.reduce((s,b)=>s+(b.cost||0),0);
  let html='';
  if(tc>0)html+=`<div class="cost-bar"><span>💰 총 예상 비용</span><span>${tc.toLocaleString()}원</span></div>`;
  if(!sorted.length){html+=`<div class="empty"><div class="empty-icon">🗓️</div><p style="font-size:15px;font-weight:600;">일정이 없어요</p><p style="margin-top:5px;opacity:.7;">아래 + 버튼으로 추가해보세요</p></div>`;}
  else{
    sorted.forEach((block,idx)=>{
      const c=cat(block.categoryId);
      const dur=durStr(block.startTime,block.endTime);
      const next=sorted[idx+1];
      const gapMin=next?t2m(next.startTime)-t2m(block.endTime):0;
      const nowM=(new Date().getHours()*60+new Date().getMinutes());
      const blockPast=isFuture(trip.date)&&t2m(block.endTime)<nowM||!isFuture(trip.date);
      const blockCurrent=isFuture(trip.date)&&nowM>=t2m(block.startTime)&&nowM<t2m(block.endTime);
      html+=`<div class="block-row${blockPast?' past-block':blockCurrent?' current-block':''}">
        <div class="block-time"><div class="start">${block.startTime}</div><div class="end">${block.endTime}</div></div>
        <div class="block-icon-col"><div class="cat-icon" style="background:${c.color}18;border-color:${c.color}55;">${c.icon}</div></div>
        <div class="block-card-wrap"><div class="block-card" onclick="openEditBlock('${block.id}')">
          <div class="block-card-header">
            <div style="flex:1;">
              <div class="block-place">${block.place}</div>
              <div class="block-tags">
                <span class="cat-tag" style="background:${c.color}18;color:${c.color};">${c.label}</span>
                ${dur?`<span class="block-dur">⏱ ${dur}</span>`:''}
                ${block.cost>0?`<span class="block-cost">💰 ${block.cost.toLocaleString()}원</span>`:''}
              </div>
              ${block.memo?`<div class="block-memo">📝 ${block.memo}</div>`:''}
            </div>
            <button class="del-block" onclick="event.stopPropagation();deleteBlock('${block.id}')">🗑</button>
          </div></div></div></div>`;
      if(next&&gapMin>0){const gs=durStr(block.endTime,next.startTime);html+=`<div class="gap-row"><div class="g1"></div><div class="g2"><div class="dot-line"></div></div><div class="g3">여유 ${gs}</div></div>`;}
      if(next&&gapMin<0){html+=`<div class="overlap-row"><div class="o1"></div><div class="o2"></div><div class="overlap-warn">⚠️ 앞 일정과 시간이 겹쳐요</div></div>`;}
    });
  }
  el.innerHTML=html;
}

function renderChecklist(trip,el){
  const done=trip.checklist.filter(c=>c.done).length;
  const avail=CHECKLIST_TEMPLATES.filter(t=>!trip.checklist.find(c=>c.text===t));
  let html=`<div class="check-summary">${done}/${trip.checklist.length} 완료</div>`;
  html+=trip.checklist.map(item=>`
    <div class="check-item" onclick="toggleCheck('${item.id}')">
      <div class="check-box ${item.done?'done':'undone'}">${item.done?'<span class="tick">✓</span>':''}</div>
      <span class="check-text ${item.done?'done':'undone'}">${item.text}</span>
      <button class="check-del" onclick="event.stopPropagation();deleteCheck('${item.id}')">×</button>
    </div>`).join('');
  html+=`<div class="quick-label">빠른 추가</div>
    <div class="quick-tags">${avail.map(t=>`<button class="quick-tag" onclick="addCheck('${t}')">+ ${t}</button>`).join('')}</div>
    <div class="check-input-row">
      <input class="check-input" id="checkInput" placeholder="직접 입력" onkeydown="if(event.key==='Enter')addCheckInput()">
      <button class="check-add-btn" onclick="addCheckInput()">추가</button>
    </div>`;
  el.innerHTML=html;
}

function updateDurPreview(){

const parseDur=v=>{if(!v)return 0;if(v.includes(':')){const[h,m]=v.split(':').map(Number);return(h||0)*60+(m||0);}return parseInt(v)||0;};
const fmtDur=m=>{const h=Math.floor(m/60),mn=m%60;return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;};
function onStartChange(){if(_iS)return;const s=document.getElementById('bfStart').value,dur=parseDur(document.getElementById('bfDur').value);if(dur>0){_iE=true;document.getElementById('bfEnd').value=m2t(t2m(s)+dur);_iE=false;}updateDurPreview();}
function onEndChange(){if(_iE)return;const s=document.getElementById('bfStart').value,e=document.getElementById('bfEnd').value,dur=t2m(e)-t2m(s);if(dur>0){_iD=true;document.getElementById('bfDur').value=fmtDur(dur);_iD=false;}updateDurPreview();}
function onDurChange(){if(_iD)return;const s=document.getElementById('bfStart').value,dur=parseDur(document.getElementById('bfDur').value);if(dur>0){_iE=true;document.getElementById('bfEnd').value=m2t(t2m(s)+dur);_iE=false;}updateDurPreview();}

function saveBlock(){
  const place=document.getElementById('bfPlace').value.trim();if(!place)return;
  const entry={id:editBlockId||Date.now(),
    startTime:document.getElementById('bfStart').value,
    endTime:document.getElementById('bfEnd').value,
    place,categoryId:selCatId,
    memo:document.getElementById('bfMemo').value.trim(),
    cost:parseInt(document.getElementById('bfCost').value)||0};
  if(editBlockId)selTrip.blocks=selTrip.blocks.map(b=>b.id==editBlockId?entry:b);
  else selTrip.blocks.push(entry);
  selTrip.blocks.sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
  syncTrip();
  document.getElementById('blockOverlay').classList.add('hidden');
  renderTimeline();
}


// ── 즐겨찾기 ──────────────────────────────────────────────────────
let favPlaces = JSON.parse(localStorage.getItem('daytrip_favs')||'[]');
const saveFavs = () => localStorage.setItem('daytrip_favs', JSON.stringify(favPlaces));

function renderFavSection(){
  const el = document.getElementById('favSection');
  if(!el) return;
  const cur = document.getElementById('bfPlace').value.trim();
  const isAlready = favPlaces.includes(cur);
  let html = '';
  if(favPlaces.length){
    html += '<div class="fav-section-label">⭐ 즐겨찾기</div><div class="fav-wrap">';
    html += favPlaces.map(p=>`
      <div class="fav-chip" onclick="applyFav('${p.replace(/'/g,"\'")}')">
        ${p}
        <span class="fav-del" onclick="event.stopPropagation();removeFav('${p.replace(/'/g,"\'")}')">×</span>
      </div>`).join('');
    html += '</div>';
  }
  if(cur && !isAlready){
    html += `<button onclick="addFav()" style="font-size:11px;color:var(--acc);font-weight:700;
      background:none;border:none;cursor:pointer;margin-bottom:8px;">⭐ '${cur}' 즐겨찾기에 추가</button>`;
  }
  el.innerHTML = html;
}
function applyFav(p){
  document.getElementById('bfPlace').value = p;
  renderFavSection();
}
function addFav(){
  const p = document.getElementById('bfPlace').value.trim();
  if(p && !favPlaces.includes(p)){ favPlaces.push(p); saveFavs(); renderFavSection(); }
}
function removeFav(p){
  favPlaces = favPlaces.filter(x=>x!==p); saveFavs(); renderFavSection();
}

// ── 일정 복사 ─────────────────────────────────────────────────────
function copyTrip(){
  const date = prompt('복사할 날짜를 입력하세요 (예: 2025-08-20)');
  if(!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)){ if(date!==null) alert('날짜 형식이 올바르지 않아요'); return; }
  const copied = {
    id: Date.now(),
    title: selTrip.title + ' (복사)',
    date,
    blocks: selTrip.blocks.map(b=>({...b, id:Date.now()+Math.random()})),
    checklist: selTrip.checklist.map(c=>({...c, id:Date.now()+Math.random(), done:false})),
  };
  trips.push(copied); save();
  if(confirm('복사 완료! 복사된 일정으로 이동할까요?')) showTimeline(copied);
}

showCal();
