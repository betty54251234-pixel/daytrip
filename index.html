<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DayTrip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayTrip">
<meta name="theme-color" content="#0d1117">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --header:#0d1117;--headerSub:#161b22;--headerBdr:#30363d;
  --headerTxt:#e6edf3;--headerSub2:#7d8590;
  --bg:#f5f6fa;--card:#fff;--card2:#f0f2f8;--border:#e4e6ef;
  --txt:#1a1d2e;--sub:#8b90a0;--acc:#5C6BC0;--accL:#EEF0FB;
  --red:#f85149;--sun:#2188ff;
}
html{background:var(--header);}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
button{border:none;background:none;cursor:pointer;font-family:inherit;}
input{font-family:inherit;}

.hd{background:var(--header);padding:env(safe-area-inset-top) 0 0;}
.hd-inner{padding:14px 20px 16px;display:flex;justify-content:space-between;align-items:center;}
.hd-title{font-size:22px;font-weight:900;color:var(--headerTxt);letter-spacing:-.5px;}
.hd-sub{font-size:11px;color:var(--headerSub2);margin-top:2px;}
.btn-new{background:var(--acc);border-radius:12px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px;}

.month-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;}
.month-nav button{font-size:24px;color:var(--txt);padding:4px 8px;}
.month-nav span{font-size:17px;font-weight:800;color:var(--txt);}

.cal-card{margin:0 16px;background:var(--card);border-radius:20px;overflow:hidden;
  border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 0;border-bottom:1px solid var(--border);}
.dow-cell{text-align:center;font-size:11px;font-weight:700;color:var(--sub);}
.dow-cell:first-child{color:var(--red);}.dow-cell:last-child{color:var(--sun);}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 0;}
.day-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:50px;cursor:pointer;position:relative;}
.day-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;position:relative;z-index:1;}
.day-num.today{background:var(--acc);color:#fff;font-weight:800;}
.day-num.sun{color:var(--red);}.day-num.sat{color:var(--sun);}
.day-num.has-trip{font-weight:800;}
.range-bar{position:absolute;height:32px;top:50%;transform:translateY(-50%);
  z-index:0;pointer-events:none;}
.range-start .range-bar{left:50%;right:0;border-radius:16px 0 0 16px;}
.range-end .range-bar{left:0;right:50%;border-radius:0 16px 16px 0;}
.range-mid .range-bar{left:0;right:0;border-radius:0;}
.dots{position:absolute;bottom:4px;display:flex;gap:3px;z-index:2;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--acc);}
.dot.past{background:var(--sub);}

.next-card{margin:16px 16px 0;background:var(--card);border-radius:20px;padding:16px;
  border:1.5px solid rgba(92,107,192,.4);box-shadow:0 3px 10px rgba(92,107,192,.1);cursor:pointer;}
.next-label{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.next-title{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:3px;}
.next-date-txt{font-size:12px;color:var(--sub);}
.dday-badge{background:var(--accL);border-radius:14px;padding:10px 14px;text-align:center;
  border:1px solid rgba(92,107,192,.3);min-width:70px;}
.dday-text{font-size:20px;font-weight:900;color:var(--acc);line-height:1.2;}
.next-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.next-meta span{font-size:11px;color:var(--sub);}

.list-section{padding:20px 16px 120px;}
.list-label{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.5px;margin-bottom:12px;}
.trip-item{background:var(--card);border-radius:16px;padding:14px;margin-bottom:9px;
  display:flex;align-items:center;gap:12px;border:1px solid var(--border);cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.04);}
.trip-item.past{opacity:.45;}
.trip-date-box{background:var(--accL);border-radius:12px;padding:8px 10px;text-align:center;min-width:46px;}
.trip-date-box.past{background:var(--card2);}
.trip-day{font-size:17px;font-weight:900;color:var(--acc);line-height:1.2;}
.trip-day.past{color:var(--sub);}
.trip-mon{font-size:10px;color:var(--acc);font-weight:600;}
.trip-mon.past{color:var(--sub);}
.trip-info{flex:1;}
.trip-name{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.trip-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.trip-meta span{font-size:11px;color:var(--sub);}
.status-badge{padding:2px 6px;border-radius:5px;font-size:10px;font-weight:600;}
.status-badge.upcoming{background:var(--accL);color:var(--acc);}
.status-badge.done{background:var(--card2);color:var(--sub);}
.trip-arrow{font-size:20px;color:var(--border);}
.fab{position:fixed;bottom:calc(34px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--acc);border-radius:28px;padding:16px 30px;color:#fff;font-size:15px;font-weight:800;
  box-shadow:0 5px 18px rgba(92,107,192,.4);z-index:50;border:none;cursor:pointer;white-space:nowrap;}
.empty{text-align:center;padding:50px 20px;background:var(--card);border-radius:20px;border:1px solid var(--border);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty p{font-size:14px;color:var(--sub);}

.tl-hd{background:var(--header);padding:env(safe-area-inset-top) 0 0;}
.tl-hd-inner{padding:10px 16px 0;}
.tl-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.back-btn{background:var(--headerSub);border-radius:12px;padding:10px 12px;
  border:1px solid var(--headerBdr);color:var(--headerTxt);font-size:16px;}
.tl-title-wrap{flex:1;}
.tl-title{font-size:17px;font-weight:800;color:var(--headerTxt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-meta{display:flex;align-items:center;gap:7px;margin-top:3px;}
.tl-date{font-size:11px;color:var(--headerSub2);}
.tl-dday{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;}
.tl-dday.upcoming{background:rgba(92,107,192,.2);color:#a5b4fc;}
.tl-dday.past{background:rgba(255,255,255,.08);color:var(--headerSub2);}
.hd-actions{display:flex;gap:4px;}
.hd-btn{background:var(--headerSub);border-radius:12px;padding:10px 12px;
  border:1px solid var(--headerBdr);font-size:14px;}
.tabs{display:flex;background:var(--headerSub);border-radius:14px;padding:4px;border:1px solid var(--headerBdr);}
.tab-btn{flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;color:var(--headerSub2);background:none;}
.tab-btn.active{background:var(--acc);color:#fff;}
.tabs-wrap{padding:4px 16px 0;}
.day-tabs{display:flex;justify-content:center;gap:8px;overflow-x:auto;
  padding:10px 16px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{padding:8px 18px;border-radius:20px;border:1.5px solid var(--headerBdr);
  color:var(--headerSub2);font-size:12px;font-weight:700;white-space:nowrap;background:none;flex-shrink:0;}
.day-tab.active{background:var(--acc);border-color:var(--acc);color:#fff;}

.tl-body{padding:16px 16px 120px;}
.cost-bar{background:var(--card);border-radius:14px;padding:13px 16px;margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);}
.cost-bar span:first-child{font-size:13px;color:var(--acc);font-weight:600;}
.cost-bar span:last-child{font-size:17px;font-weight:900;color:var(--acc);}
.block-row{display:flex;gap:12px;}
.block-time{width:46px;padding-top:7px;text-align:right;}
.block-time .start{font-size:12px;font-weight:700;color:var(--txt);}
.block-time .end{font-size:10px;color:var(--sub);margin-top:2px;}
.block-icon-col{display:flex;flex-direction:column;align-items:center;padding-top:4px;}
.cat-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:18px;border-width:1.5px;border-style:solid;}
.block-card-wrap{flex:1;margin-bottom:8px;}
.block-card{background:var(--card);border-radius:14px;padding:13px;border:1px solid var(--border);
  cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.block-card-header{display:flex;justify-content:space-between;align-items:flex-start;}
.block-place{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:5px;}
.block-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.cat-tag{padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;}
.block-dur,.block-cost{font-size:11px;color:var(--sub);}
.block-memo{font-size:12px;color:var(--sub);margin-top:6px;}
.del-block{font-size:14px;color:var(--border);padding-left:10px;background:none;border:none;cursor:pointer;}
.gap-row{display:flex;gap:12px;margin:-4px 0 2px;}
.gap-row .g1{width:46px;}.gap-row .g2{width:36px;}
.gap-row .g3{flex:1;padding:3px 2px;font-size:11px;color:var(--sub);font-style:italic;}
.overlap-row{display:flex;gap:12px;margin:-4px 0 4px;}
.overlap-row .o1{width:46px;}.overlap-row .o2{width:36px;}
.overlap-warn{flex:1;background:#FEF3C7;border-radius:8px;padding:6px 10px;font-size:11px;color:#92400E;font-weight:600;}

.check-summary{font-size:12px;color:var(--sub);margin-bottom:14px;}
.check-item{background:var(--card);border-radius:13px;padding:14px;margin-bottom:8px;
  display:flex;align-items:center;gap:13px;border:1px solid var(--border);cursor:pointer;}
.check-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;border-width:2px;border-style:solid;}
.check-box.done{background:var(--acc);border-color:var(--acc);}
.check-box.undone{background:transparent;border-color:var(--border);}
.check-box .tick{color:#fff;font-size:12px;font-weight:800;}
.check-text{flex:1;font-size:14px;}
.check-text.done{color:var(--sub);text-decoration:line-through;}
.check-text.undone{color:var(--txt);}
.check-del{font-size:18px;color:var(--border);background:none;border:none;cursor:pointer;}
.quick-label{font-size:12px;font-weight:700;color:var(--sub);margin:18px 0 11px;}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.quick-tag{background:var(--accL);border-radius:20px;padding:8px 14px;
  border:1px solid rgba(92,107,192,.3);font-size:12px;color:var(--acc);font-weight:700;cursor:pointer;}
.check-input-row{display:flex;gap:8px;}
.check-input{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:12px;
  font-size:14px;color:var(--txt);background:var(--card);outline:none;}
.check-add-btn{background:var(--acc);border-radius:12px;padding:0 18px;color:#fff;font-weight:700;font-size:14px;}

.preset-section{margin-bottom:20px;}
.preset-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.preset-section-label{font-size:12px;font-weight:700;color:var(--sub);}
.preset-edit-btn{font-size:11px;color:var(--acc);font-weight:700;padding:4px 10px;
  background:var(--accL);border-radius:8px;border:none;cursor:pointer;}
.preset-list{display:flex;flex-wrap:wrap;gap:8px;}
.preset-btn{background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.preset-btn .p-icon{font-size:18px;}
.preset-btn .p-name{font-size:13px;font-weight:700;color:var(--txt);display:block;text-align:left;}
.preset-btn .p-count{font-size:11px;color:var(--sub);display:block;text-align:left;}

.fav-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.fav-chip{background:var(--accL);border:1px solid rgba(92,107,192,.3);border-radius:20px;
  padding:7px 13px;font-size:12px;color:var(--acc);font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;}
.fav-del{color:var(--acc);opacity:.5;font-size:14px;line-height:1;background:none;border:none;cursor:pointer;}
.fav-section-label{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:8px;margin-top:4px;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;}
.overlay.hidden{display:none;}
.modal-sheet{background:var(--card);border-radius:28px 28px 0 0;width:100%;max-width:480px;
  padding:0 0 calc(44px + env(safe-area-inset-bottom));}
.modal-handle-wrap{padding:14px 0 0;display:flex;justify-content:center;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;}
.modal-header{padding:18px 24px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-size:20px;font-weight:900;color:var(--txt);}
.modal-close{font-size:24px;color:var(--sub);background:none;border:none;cursor:pointer;line-height:1;}
.modal-body{padding:20px 24px 0;}
.input-group{margin-bottom:16px;}
.input-group label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px;}
.styled-input{width:100%;border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;
  font-size:15px;color:var(--txt);background:var(--bg);outline:none;
  -webkit-appearance:none;appearance:none;transition:border-color .15s;}
.styled-input:focus{border-color:var(--acc);background:#fff;}
.styled-input::placeholder{color:var(--sub);}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:.4;width:20px;height:20px;cursor:pointer;}
.modal-footer{padding:20px 24px 0;}
.primary-btn{width:100%;background:var(--acc);border-radius:16px;padding:16px;color:#fff;
  font-size:16px;font-weight:800;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(92,107,192,.35);}
.date-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end;}
.date-sep{text-align:center;color:var(--sub);font-size:16px;font-weight:700;padding-bottom:14px;}
.day-count-preview{font-size:12px;color:var(--acc);font-weight:700;margin-top:6px;min-height:18px;}

.block-modal-sheet{background:var(--card);border-radius:28px 28px 0 0;width:100%;max-width:480px;
  max-height:92vh;overflow-y:auto;padding:0 0 calc(60px + env(safe-area-inset-bottom));}
.block-modal-body{padding:20px 24px 0;}
.time-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
.time-field label{font-size:10px;color:var(--sub);text-align:center;display:block;margin-bottom:6px;font-weight:700;}
.time-field input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 8px;
  font-size:15px;color:var(--txt);background:var(--bg);text-align:center;font-weight:700;outline:none;-webkit-appearance:none;}
.time-field input:focus{border-color:var(--acc);background:#fff;}
.dur-preview{font-size:12px;color:var(--acc);font-weight:700;text-align:center;margin-bottom:16px;min-height:18px;}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.cat-btn{padding:10px 4px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--bg);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.cat-btn .cicon{font-size:20px;}
.cat-btn .clabel{font-size:9px;font-weight:700;color:var(--sub);}
.day-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.day-sel-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--bg);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;}
.day-sel-btn.active{background:var(--acc);border-color:var(--acc);color:#fff;}

.preset-editor-sheet{background:var(--card);border-radius:28px 28px 0 0;width:100%;max-width:480px;
  max-height:92vh;overflow-y:auto;padding:0 0 calc(60px + env(safe-area-inset-bottom));}
.pe-body{padding:20px 24px 0;}
.pe-preset{background:var(--bg);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--border);}
.pe-header{display:flex;align-items:center;gap:10px;cursor:pointer;}
.pe-icon-name{display:flex;align-items:center;gap:8px;flex:1;}
.pe-icon{font-size:22px;}
.pe-name{font-size:15px;font-weight:700;color:var(--txt);}
.pe-count{font-size:11px;color:var(--sub);}
.pe-actions{display:flex;gap:6px;}
.pe-del-btn{font-size:12px;color:var(--red);padding:4px 8px;border-radius:8px;
  border:1px solid rgba(248,81,73,.25);background:none;cursor:pointer;}
.pe-expand{font-size:14px;color:var(--sub);background:none;border:none;}
.pe-items{margin-top:12px;display:none;}
.pe-items.open{display:block;}
.pe-item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.pe-item-row:last-of-type{border:none;}
.pe-item-text{flex:1;font-size:13px;color:var(--txt);}
.pe-item-del{font-size:18px;color:var(--sub);background:none;border:none;cursor:pointer;}
.pe-add-row{display:flex;gap:8px;margin-top:10px;}
.pe-add-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;
  font-size:13px;color:var(--txt);background:var(--card);outline:none;}
.pe-add-input:focus{border-color:var(--acc);}
.pe-add-btn{background:var(--acc);border-radius:10px;padding:0 14px;color:#fff;font-weight:700;font-size:13px;border:none;cursor:pointer;}
.new-preset-btn{width:100%;padding:14px;border-radius:14px;border:1.5px dashed var(--border);
  background:none;font-size:14px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:8px;}
.new-preset-form{background:var(--bg);border-radius:16px;padding:14px;margin-bottom:10px;border:1.5px solid var(--acc);}
.np-row{display:flex;gap:8px;margin-bottom:10px;}
.np-icon{width:56px;border:1.5px solid var(--border);border-radius:10px;padding:10px;
  font-size:18px;text-align:center;background:var(--card);outline:none;}
.np-name{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;
  font-size:14px;color:var(--txt);background:var(--card);outline:none;}
.np-name:focus{border-color:var(--acc);}
.np-create{width:100%;background:var(--acc);border-radius:12px;padding:12px;
  color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;}
</style>
</head>
<body>

<div id="calView">
  <div class="hd">
    <div class="hd-inner">
      <div><div class="hd-title">🗺️ DayTrip</div><div class="hd-sub">외출 플래너</div></div>
      <button class="btn-new" onclick="openNewTrip()">＋ 새 일정</button>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-card">
    <div class="dow-row">
      <div class="dow-cell">일</div><div class="dow-cell">월</div><div class="dow-cell">화</div>
      <div class="dow-cell">수</div><div class="dow-cell">목</div><div class="dow-cell">금</div>
      <div class="dow-cell">토</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
  <div id="nextCard"></div>
  <div class="list-section">
    <div class="list-label">전체 일정 목록</div>
    <div id="tripList"></div>
  </div>
  <button class="fab" onclick="openNewTrip()">＋ 새 외출 일정</button>
</div>

<div id="tlView" style="display:none;height:100vh;flex-direction:column;">
  <div class="tl-hd">
    <div class="tl-hd-inner">
      <div class="tl-top">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="tl-title-wrap">
          <div class="tl-title" id="tlTitle"></div>
          <div class="tl-meta">
            <span class="tl-date" id="tlDate"></span>
            <span class="tl-dday" id="tlDday"></span>
          </div>
        </div>
        <div class="hd-actions">
          <button class="hd-btn" onclick="copyTrip()">📋</button>
          <button class="hd-btn" onclick="deleteCurrentTrip()">🗑</button>
        </div>
      </div>

<script>
const CATEGORIES=[
  {id:'bus',label:'버스',icon:'🚌',color:'#4CAF50'},
  {id:'subway',label:'지하철',icon:'🚇',color:'#039BE5'},
  {id:'train',label:'기차',icon:'🚄',color:'#8E24AA'},
  {id:'walk',label:'도보',icon:'🚶',color:'#FB8C00'},
  {id:'taxi',label:'택시',icon:'🚕',color:'#F9A825'},
  {id:'car',label:'자가용',icon:'🚗',color:'#546E7A'},
  {id:'meal',label:'식사',icon:'🍽️',color:'#E53935'},
  {id:'cafe',label:'카페',icon:'☕',color:'#6D4C41'},
  {id:'shopping',label:'쇼핑',icon:'🛍️',color:'#D81B60'},
  {id:'hospital',label:'병원',icon:'🏥',color:'#00ACC1'},
  {id:'exam',label:'시험',icon:'📝',color:'#F4511E'},
  {id:'sightseeing',label:'관광',icon:'📸',color:'#43A047'},
  {id:'etc',label:'기타',icon:'📌',color:'#757575'},
];
const DEFAULT_PRESETS=[
  {id:'seoul',icon:'🏙️',name:'서울 외출',items:['교통카드','신분증','충전기','보조배터리','우산','현금','마스크']},
  {id:'hospital',icon:'🏥',name:'병원',items:['신분증','의료보험증','진료예약확인증','현금','충전기','마스크']},
  {id:'exam',icon:'📝',name:'시험',items:['수험표','신분증','컴퓨터용 수성사인펜','수정테이프','교통카드','충전기','물','간식']},
  {id:'abroad',icon:'✈️',name:'해외 여행',items:['여권','항공권','숙소예약확인증','여행자보험','환전','신용카드','충전기','어댑터','상비약']},
  {id:'oneday',icon:'🎒',name:'1일 일정',items:['교통카드','신분증','충전기','현금','물','간식','우산']},
];
const CHECKLIST_TEMPLATES=['교통카드','신분증','수험표','우산','충전기','현금','마스크'];

const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const m2t=m=>{const x=((m%1440)+1440)%1440;return`${String(Math.floor(x/60)).padStart(2,'0')}:${String(x%60).padStart(2,'0')}`;};
const durStr=(s,e)=>{const d=t2m(e)-t2m(s);if(d<=0)return'';const h=Math.floor(d/60),mn=d%60;return h&&mn?`${h}시간 ${mn}분`:h?`${h}시간`:`${mn}분`;};
const todayStr=()=>new Date().toISOString().split('T')[0];
const isFuture=ds=>ds>=todayStr();
const fmtDate=ds=>{const d=new Date(ds+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일 (${'일월화수목금토'[d.getDay()]})`;};
const dDay=ds=>{const diff=Math.ceil((new Date(ds+'T00:00:00')-new Date(new Date().toDateString()))/86400000);return diff===0?'D-DAY':diff>0?`D-${diff}`:`D+${Math.abs(diff)}`;};
const cat=id=>CATEGORIES.find(c=>c.id===id)||CATEGORIES[12];
const parseDur=v=>{if(!v)return 0;const s=String(v);if(s.includes(':')){const[h,m]=s.split(':').map(Number);return(h||0)*60+(m||0);}return parseInt(s)||0;};
const fmtDur=m=>{const h=Math.floor(m/60),mn=m%60;return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;};

const migrate=t=>({...t,startDate:t.startDate||t.date||'',endDate:t.endDate||t.date||'',
  blocks:(t.blocks||[]).map(b=>({...b,dayIdx:b.dayIdx||0}))});
const tripDays=t=>{
  const days=[];let d=new Date((t.startDate||t.date)+'T00:00:00');
  const end=new Date((t.endDate||t.date)+'T00:00:00');
  while(d<=end){
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    days.push(`${y}-${m}-${day}`);d.setDate(d.getDate()+1);
  }
  return days;
};
const isMultiDay=t=>(t.startDate||t.date)!==(t.endDate||t.date);
const dayCount=t=>tripDays(t).length;
const tripFuture=t=>isFuture(t.startDate||t.date);
const fmtRange=t=>{
  const s=t.startDate||t.date,e=t.endDate||t.date;
  if(s===e)return fmtDate(s);
  const sd=new Date(s+'T00:00:00'),ed=new Date(e+'T00:00:00');
  const n=dayCount(t);
  return`${sd.getMonth()+1}/${sd.getDate()} ~ ${ed.getMonth()+1}/${ed.getDate()} (${n-1}박 ${n}일)`;
};

let trips=JSON.parse(localStorage.getItem('daytrip_v1')||'[]').map(migrate);
let presets=JSON.parse(localStorage.getItem('daytrip_presets')||'null')||DEFAULT_PRESETS.map(p=>({...p,items:[...p.items]}));
let favPlaces=JSON.parse(localStorage.getItem('daytrip_favs')||'[]');
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let selTrip=null,currentTab='timeline',curDayIdx=0;
let editBlockId=null,selCatId='etc',selBlockDay=0;
let peExpanded={},peShowNew=false;
let _iS=false,_iE=false,_iD=false;

const save=()=>localStorage.setItem('daytrip_v1',JSON.stringify(trips));
const savePresets=()=>localStorage.setItem('daytrip_presets',JSON.stringify(presets));
const saveFavs=()=>localStorage.setItem('daytrip_favs',JSON.stringify(favPlaces));
const sortedTrips=()=>[
  ...trips.filter(t=>tripFuture(t)).sort((a,b)=>(a.startDate||a.date).localeCompare(b.startDate||b.date)),
  ...trips.filter(t=>!tripFuture(t)).sort((a,b)=>(b.startDate||b.date).localeCompare(a.startDate||a.date)),
];

function showCal(){document.getElementById('calView').style.display='block';document.getElementById('tlView').style.display='none';renderCal();}
function showTimeline(trip){selTrip=trip;currentTab='timeline';curDayIdx=0;document.getElementById('calView').style.display='none';const tl=document.getElementById('tlView');tl.style.display='flex';tl.style.flexDirection='column';renderTimeline();}
function goBack(){showCal();}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function closeOverlay(id,e){if(e.target===document.getElementById(id))closeModal(id);}

function renderCal(){document.getElementById('monthLabel').textContent=`${calYear}년 ${calMonth+1}월`;renderDays();renderNextCard();renderTripList();}
function changeMonth(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function renderDays(){
  const grid=document.getElementById('daysGrid');grid.innerHTML='';
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();

  // 날짜별 정보 수집
  const dateInfo={};
  trips.forEach(t=>{
    const days=tripDays(t);
    const multi=days.length>1;
    days.forEach((ds,i)=>{
      if(!dateInfo[ds])dateInfo[ds]=[];
      const pos=multi?(i===0?'start':i===days.length-1?'end':'mid'):'single';
      dateInfo[ds].push({trip:t,pos,multi});
    });
  });

  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day-cell';grid.appendChild(e);}

  for(let d=1;d<=total;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(first+d-1)%7;
    const info=dateInfo[ds]||[];
    const hasTrip=info.length>0;
    const future=hasTrip?tripFuture(info[0].trip):true;
    const pos=hasTrip?info[0].pos:null;
    const isMulti=hasTrip&&info[0].multi;

    const cell=document.createElement('div');
    cell.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;height:50px;cursor:pointer;position:relative;';
    cell.onclick=()=>goDate(ds);



    // 날짜 숫자
    const num=document.createElement('div');
    let numStyle=`width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1;font-weight:${hasTrip?'800':'400'};`;
    if(ds===today){numStyle+='background:var(--acc);color:#fff;font-weight:800;width:30px;height:30px;border-radius:50%;';}
    else if(dow===0){numStyle+='color:var(--red);';}
    else if(dow===6){numStyle+='color:var(--sun);';}
    else{numStyle+='color:var(--txt);';}
    num.style.cssText=numStyle;
    num.textContent=d;
    cell.appendChild(num);

    // 1일 일정 점
    if(hasTrip){
      const dots=document.createElement('div');
      dots.style.cssText='position:absolute;bottom:4px;display:flex;gap:3px;z-index:2;';
      info.slice(0,2).forEach(({trip})=>{
        const dot=document.createElement('div');
        const dotColor=tripFuture(trip)?(info[0].multi?'#4DB6AC':'var(--acc)'):'var(--sub)';
        dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${dotColor};`;
        dots.appendChild(dot);
      });
      cell.appendChild(dots);
    }

    grid.appendChild(cell);
  }
}

function renderNextCard(){
  const el=document.getElementById('nextCard');
  const next=sortedTrips().find(t=>tripFuture(t));
  if(!next){el.innerHTML='';return;}
  const tc=next.blocks.reduce((s,b)=>s+(b.cost||0),0);
  el.innerHTML=`<div class="next-card" onclick="showTimeline(trips.find(t=>t.id==${next.id}))">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
      <div style="flex:1;"><div class="next-label">다음 일정</div>
        <div class="next-title">${next.title}</div>
        <div class="next-date-txt">${fmtRange(next)}</div>
      </div>
      <div class="dday-badge"><div class="dday-text">${dDay(next.startDate||next.date)}</div></div>
    </div>
    <div class="next-meta">
      ${isMultiDay(next)?`<span>🌙 ${dayCount(next)-1}박 ${dayCount(next)}일</span>`:''}
      <span>📍 ${next.blocks.length}개 장소</span>
      ${tc>0?`<span>💰 ${tc.toLocaleString()}원</span>`:''}
    </div></div>`;
}

function renderTripList(){
  const el=document.getElementById('tripList');
  const sorted=sortedTrips();
  if(!sorted.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🗓️</div><p>날짜를 탭해서 일정을 만들어보세요</p></div>`;return;}
  el.innerHTML=sorted.map(t=>{
    const future=tripFuture(t);const tc=t.blocks.reduce((s,b)=>s+(b.cost||0),0);
    const sd=new Date((t.startDate||t.date)+'T00:00:00');
    return`<div class="trip-item${future?'':' past'}" onclick="showTimeline(trips.find(x=>x.id==${t.id}))">
      <div class="trip-date-box${future?'':' past'}">
        <div class="trip-day${future?'':' past'}">${sd.getDate()}</div>
        <div class="trip-mon${future?'':' past'}">${sd.getMonth()+1}월</div>
      </div>
      <div class="trip-info">
        <div class="trip-name">${t.title}</div>
        <div class="trip-meta">
          ${isMultiDay(t)?`<span>🌙 ${dayCount(t)-1}박 ${dayCount(t)}일</span>`:''}
          <span>📍 ${t.blocks.length}개</span>
          ${tc>0?`<span>💰 ${tc.toLocaleString()}원</span>`:''}
          <span class="status-badge ${future?'upcoming':'done'}">${future?'예정':'완료'}</span>
        </div>
      </div><span class="trip-arrow">›</span></div>`;
  }).join('');
}

function goDate(ds){
  const ts=trips.filter(t=>tripDays(t).includes(ds));
  if(ts.length){showTimeline(ts[0]);}
  else{document.getElementById('newTripStart').value=ds;document.getElementById('newTripEnd').value=ds;onDateChange();openNewTrip();}
}

function openNewTrip(){
  document.getElementById('newTripOverlay').classList.remove('hidden');
  if(!document.getElementById('newTripStart').value){const td=todayStr();document.getElementById('newTripStart').value=td;document.getElementById('newTripEnd').value=td;onDateChange();}
  document.getElementById('newTripTitle').value='';
  setTimeout(()=>document.getElementById('newTripTitle').focus(),100);
}
function onDateChange(){
  const s=document.getElementById('newTripStart').value,e=document.getElementById('newTripEnd').value;
  const el=document.getElementById('dayCountPreview');
  if(!s||!e){el.textContent='';return;}
  if(e<s){document.getElementById('newTripEnd').value=s;el.textContent='1일 일정';return;}
  const diff=Math.round((new Date(e+'T00:00:00')-new Date(s+'T00:00:00'))/86400000)+1;
  el.textContent=diff===1?'1일 일정 ☀️':`${diff-1}박 ${diff}일 🌙`;
}
function createTrip(){
  const title=document.getElementById('newTripTitle').value.trim();
  const startDate=document.getElementById('newTripStart').value;
  const endDate=document.getElementById('newTripEnd').value||startDate;
  if(!title||!startDate)return;
  const t={id:Date.now(),title,startDate,endDate:endDate>=startDate?endDate:startDate,blocks:[],checklist:[]};
  trips.push(t);save();closeModal('newTripOverlay');showTimeline(t);
}

function renderTimeline(){
  const trip=selTrip;
  document.getElementById('tlTitle').textContent=trip.title;
  document.getElementById('tlDate').textContent=fmtRange(trip);
  const dd=document.getElementById('tlDday');
  dd.textContent=dDay(trip.startDate||trip.date);
  dd.className='tl-dday '+(tripFuture(trip)?'upcoming':'past');
  document.getElementById('tabTimeline').className='tab-btn'+(currentTab==='timeline'?' active':'');
  document.getElementById('tabChecklist').className='tab-btn'+(currentTab==='checklist'?' active':'');
  document.getElementById('tlFab').style.display=currentTab==='timeline'?'block':'none';
  const dtWrap=document.getElementById('dayTabsWrap');
  if(currentTab==='timeline'&&isMultiDay(trip)){
    dtWrap.style.display='block';
    const days=tripDays(trip);
    document.getElementById('dayTabs').innerHTML=days.map((ds,i)=>`
      <button class="day-tab${curDayIdx===i?' active':''}" onclick="setCurDay(${i})">
        ${i+1}일차 <span style="opacity:.7;font-weight:400;">${ds.slice(5)}</span>
      </button>`).join('');
  } else dtWrap.style.display='none';
  const content=document.getElementById('tlContent');
  if(currentTab==='timeline')renderBlocks(trip,content);else renderChecklist(trip,content);
}
function switchTab(tab){currentTab=tab;renderTimeline();}
function setCurDay(i){curDayIdx=i;renderTimeline();}

function renderBlocks(trip,el){
  const dayIdx=isMultiDay(trip)?curDayIdx:0;
  const sorted=[...trip.blocks].filter(b=>(b.dayIdx||0)===dayIdx).sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
  const tc=sorted.reduce((s,b)=>s+(b.cost||0),0);
  let html='';
  if(tc>0)html+=`<div class="cost-bar"><span>💰 총 예상 비용</span><span>${tc.toLocaleString()}원</span></div>`;
  if(!sorted.length){html+=`<div class="empty"><div class="empty-icon">🗓️</div><p style="font-size:15px;font-weight:600;">일정이 없어요</p><p style="margin-top:5px;opacity:.7;">아래 + 버튼으로 추가해보세요</p></div>`;}
  else sorted.forEach((block,idx)=>{
    const c=cat(block.categoryId);const dur=durStr(block.startTime,block.endTime);
    const next=sorted[idx+1];const gapMin=next?t2m(next.startTime)-t2m(block.endTime):0;
    html+=`<div class="block-row">
      <div class="block-time"><div class="start">${block.startTime}</div><div class="end">${block.endTime}</div></div>
      <div class="block-icon-col"><div class="cat-icon" style="background:${c.color}18;border-color:${c.color}55;">${c.icon}</div></div>
      <div class="block-card-wrap"><div class="block-card" onclick="openEditBlock('${block.id}')">
        <div class="block-card-header">
          <div style="flex:1;">
            <div class="block-place">${block.place}</div>
            <div class="block-tags">
              <span class="cat-tag" style="background:${c.color}18;color:${c.color};">${c.label}</span>
              ${dur?`<span class="block-dur">⏱ ${dur}</span>`:''}
              ${block.cost>0?`<span class="block-cost">💰 ${block.cost.toLocaleString()}원</span>`:''}
            </div>
            ${block.memo?`<div class="block-memo">📝 ${block.memo}</div>`:''}
          </div>
          <button class="del-block" onclick="event.stopPropagation();deleteBlock('${block.id}')">🗑</button>
        </div></div></div></div>`;
    if(next&&gapMin>0){const gs=durStr(block.endTime,next.startTime);html+=`<div class="gap-row"><div class="g1"></div><div class="g2"></div><div class="g3">여유 ${gs}</div></div>`;}
    if(next&&gapMin<0)html+=`<div class="overlap-row"><div class="o1"></div><div class="o2"></div><div class="overlap-warn">⚠️ 앞 일정과 시간이 겹쳐요</div></div>`;
  });
  el.innerHTML=html;
}

function renderChecklist(trip,el){
  const done=trip.checklist.filter(c=>c.done).length;
  const avail=CHECKLIST_TEMPLATES.filter(t=>!trip.checklist.find(c=>c.text===t));
  let html=`<div class="check-summary">${done}/${trip.checklist.length} 완료</div>`;
  html+=`<div class="preset-section">
    <div class="preset-section-header">
      <div class="preset-section-label">📦 준비물 세트로 추가</div>
      <button class="preset-edit-btn" onclick="openPresetEditor()">✏️ 세트 편집</button>
    </div>
    <div class="preset-list">${presets.map(p=>`
      <button class="preset-btn" onclick="applyPreset('${p.id}')">
        <span class="p-icon">${p.icon}</span>
        <div><span class="p-name">${p.name}</span><span class="p-count">${p.items.length}개 항목</span></div>
      </button>`).join('')}</div></div>`;
  html+=trip.checklist.map(item=>`
    <div class="check-item" onclick="toggleCheck('${item.id}')">
      <div class="check-box ${item.done?'done':'undone'}">${item.done?'<span class="tick">✓</span>':''}</div>
      <span class="check-text ${item.done?'done':'undone'}">${item.text}</span>
      <button class="check-del" onclick="event.stopPropagation();deleteCheck('${item.id}')">×</button>
    </div>`).join('');
  html+=`<div class="quick-label">빠른 추가</div>
    <div class="quick-tags">${avail.map(t=>`<button class="quick-tag" onclick="addCheck('${t}')">+ ${t}</button>`).join('')}</div>
    <div class="check-input-row">
      <input class="check-input" id="checkInput" placeholder="직접 입력" onkeydown="if(event.key==='Enter')addCheckInput()">
      <button class="check-add-btn" onclick="addCheckInput()">추가</button>
    </div>`;
  el.innerHTML=html;
}
function toggleCheck(id){selTrip.checklist=selTrip.checklist.map(c=>c.id==id?{...c,done:!c.done}:c);syncTrip();renderTimeline();}
function deleteCheck(id){selTrip.checklist=selTrip.checklist.filter(c=>c.id!=id);syncTrip();renderTimeline();}
function addCheck(text){if(!text.trim())return;selTrip.checklist.push({id:Date.now(),text,done:false});syncTrip();renderTimeline();}
function addCheckInput(){const v=document.getElementById('checkInput').value.trim();addCheck(v);}
function applyPreset(id){
  const p=presets.find(x=>x.id===id);if(!p)return;
  p.items.forEach(text=>{if(!selTrip.checklist.find(c=>c.text===text))selTrip.checklist.push({id:Date.now()+Math.random(),text,done:false});});
  syncTrip();renderTimeline();
}

function deleteBlock(id){selTrip.blocks=selTrip.blocks.filter(b=>b.id!=id);syncTrip();renderTimeline();}
function deleteCurrentTrip(){if(!confirm('이 일정을 삭제할까요?'))return;trips=trips.filter(t=>t.id!==selTrip.id);save();showCal();}
function syncTrip(){trips=trips.map(t=>t.id===selTrip.id?selTrip:t);save();}

function buildCatGrid(){
  document.getElementById('catGrid').innerHTML=CATEGORIES.map(c=>`
    <button class="cat-btn" id="cat_${c.id}" onclick="selectCat('${c.id}')">
      <span class="cicon">${c.icon}</span><span class="clabel">${c.label}</span>
    </button>`).join('');
  updateCatGrid();
}
function selectCat(id){selCatId=id;updateCatGrid();}
function updateCatGrid(){
  CATEGORIES.forEach(c=>{
    const btn=document.getElementById('cat_'+c.id);if(!btn)return;
    if(c.id===selCatId){btn.style.borderColor=c.color;btn.style.background=c.color+'18';btn.querySelector('.clabel').style.color=c.color;}
    else{btn.style.borderColor='var(--border)';btn.style.background='var(--bg)';btn.querySelector('.clabel').style.color='var(--sub)';}
  });
}
function buildDaySelector(){
  const wrap=document.getElementById('daySelWrap');
  if(!selTrip||!isMultiDay(selTrip)){wrap.style.display='none';return;}
  wrap.style.display='block';
  const days=tripDays(selTrip);
  document.getElementById('daySelector').innerHTML=days.map((ds,i)=>`
    <button class="day-sel-btn${selBlockDay===i?' active':''}" onclick="setBlockDay(${i})">${i+1}일차 (${ds.slice(5)})</button>`).join('');
}
function setBlockDay(i){selBlockDay=i;buildDaySelector();}
function updateDurPreview(){const s=document.getElementById('bfStart').value,e=document.getElementById('bfEnd').value;const d=durStr(s,e);document.getElementById('durPreview').textContent=d?`⏱ ${d}`:'';  }
function onStartChange(){if(_iS)return;const s=document.getElementById('bfStart').value,dur=parseDur(document.getElementById('bfDur').value);if(dur>0){_iE=true;document.getElementById('bfEnd').value=m2t(t2m(s)+dur);_iE=false;}updateDurPreview();}
function onEndChange(){if(_iE)return;const s=document.getElementById('bfStart').value,e=document.getElementById('bfEnd').value,dur=t2m(e)-t2m(s);if(dur>0){_iD=true;document.getElementById('bfDur').value=fmtDur(dur);_iD=false;}updateDurPreview();}
function onDurChange(){if(_iD)return;const s=document.getElementById('bfStart').value,dur=parseDur(document.getElementById('bfDur').value);if(dur>0){_iE=true;document.getElementById('bfEnd').value=m2t(t2m(s)+dur);_iE=false;}updateDurPreview();}

function openAddBlock(){
  editBlockId=null;selCatId='etc';selBlockDay=isMultiDay(selTrip)?curDayIdx:0;
  document.getElementById('blockModalTitle').textContent='일정 추가';
  document.getElementById('bfStart').value='09:00';document.getElementById('bfEnd').value='10:00';
  document.getElementById('bfDur').value='01:00';document.getElementById('bfPlace').value='';
  document.getElementById('bfMemo').value='';document.getElementById('bfCost').value='';
  buildCatGrid();buildDaySelector();updateDurPreview();renderFavSection();
  document.getElementById('blockOverlay').classList.remove('hidden');
}
function openEditBlock(id){
  const block=selTrip.blocks.find(b=>b.id==id);if(!block)return;
  editBlockId=id;selCatId=block.categoryId||'etc';selBlockDay=block.dayIdx||0;
  document.getElementById('blockModalTitle').textContent='일정 편집';
  document.getElementById('bfStart').value=block.startTime;document.getElementById('bfEnd').value=block.endTime;
  const dur=t2m(block.endTime)-t2m(block.startTime);
  document.getElementById('bfDur').value=dur>0?fmtDur(dur):'00:00';
  document.getElementById('bfPlace').value=block.place;document.getElementById('bfMemo').value=block.memo||'';document.getElementById('bfCost').value=block.cost||'';
  buildCatGrid();buildDaySelector();updateDurPreview();renderFavSection();
  document.getElementById('blockOverlay').classList.remove('hidden');
}
function saveBlock(){
  const place=document.getElementById('bfPlace').value.trim();
  if(!place){alert('장소명을 입력해주세요');return;}
  const entry={id:editBlockId||Date.now(),dayIdx:selBlockDay,
    startTime:document.getElementById('bfStart').value,endTime:document.getElementById('bfEnd').value,
    place,categoryId:selCatId,memo:document.getElementById('bfMemo').value.trim(),
    cost:parseInt(document.getElementById('bfCost').value)||0};
  if(editBlockId)selTrip.blocks=selTrip.blocks.map(b=>b.id==editBlockId?entry:b);
  else selTrip.blocks.push(entry);
  syncTrip();closeModal('blockOverlay');renderTimeline();
}

function renderFavSection(){
  const el=document.getElementById('favSection');if(!el)return;
  const cur=document.getElementById('bfPlace').value.trim();
  const isAlready=favPlaces.includes(cur);
  let html='';
  if(favPlaces.length){
    html+='<div class="fav-section-label">⭐ 즐겨찾기</div><div class="fav-wrap">';
    html+=favPlaces.map(p=>`<div class="fav-chip" onclick="applyFav('${p.replace(/'/g,"\'")}')">
      ${p}<button class="fav-del" onclick="event.stopPropagation();removeFav('${p.replace(/'/g,"\'")}')">×</button></div>`).join('');
    html+='</div>';
  }
  if(cur&&!isAlready)html+=`<button onclick="addFav()" style="font-size:11px;color:var(--acc);font-weight:700;background:none;border:none;cursor:pointer;margin-bottom:8px;display:block;">⭐ '${cur}' 즐겨찾기에 추가</button>`;
  el.innerHTML=html;
}
function applyFav(p){document.getElementById('bfPlace').value=p;renderFavSection();}
function addFav(){const p=document.getElementById('bfPlace').value.trim();if(p&&!favPlaces.includes(p)){favPlaces.push(p);saveFavs();renderFavSection();}}
function removeFav(p){favPlaces=favPlaces.filter(x=>x!==p);saveFavs();renderFavSection();}

function copyTrip(){document.getElementById('copyDate').value='';document.getElementById('copyOverlay').classList.remove('hidden');}
function doCopyTrip(){
  const date=document.getElementById('copyDate').value;if(!date)return;
  const n=dayCount(selTrip);
  const newEnd=n>1?new Date(new Date(date+'T00:00:00').getTime()+(n-1)*86400000).toISOString().split('T')[0]:date;
  const copied={id:Date.now(),title:selTrip.title+' (복사)',startDate:date,endDate:newEnd,
    blocks:selTrip.blocks.map(b=>({...b,id:Date.now()+Math.random()})),
    checklist:selTrip.checklist.map(c=>({...c,id:Date.now()+Math.random(),done:false}))};
  trips.push(copied);save();closeModal('copyOverlay');showTimeline(copied);
}

function openPresetEditor(){peExpanded={};peShowNew=false;renderPE();document.getElementById('presetEditorOverlay').classList.remove('hidden');}
function renderPE(){
  let html=presets.map(p=>{
    const exp=peExpanded[p.id];
    return`<div class="pe-preset">
      <div class="pe-header" onclick="togglePE('${p.id}')">
        <div class="pe-icon-name"><span class="pe-icon">${p.icon}</span>
          <div><div class="pe-name">${p.name}</div><div class="pe-count">${p.items.length}개 항목</div></div>
        </div>
        <div class="pe-actions" onclick="event.stopPropagation()">
          <button class="pe-del-btn" onclick="deletePreset('${p.id}')">삭제</button>
          <button class="pe-expand">${exp?'▲':'▼'}</button>
        </div>
      </div>
      <div class="pe-items${exp?' open':''}">
        ${p.items.map((item,ii)=>`<div class="pe-item-row">
          <span class="pe-item-text">${item}</span>
          <button class="pe-item-del" onclick="removePI('${p.id}',${ii})">×</button>
        </div>`).join('')}
        <div class="pe-add-row">
          <input class="pe-add-input" id="pi_${p.id}" placeholder="항목 추가" onkeydown="if(event.key==='Enter')addPI('${p.id}')">
          <button class="pe-add-btn" onclick="addPI('${p.id}')">추가</button>
        </div>
      </div>
    </div>`;
  }).join('');
  if(peShowNew){
    html+=`<div class="new-preset-form">
      <div class="np-row">
        <input class="np-icon" id="npIcon" placeholder="🎒" maxlength="2">
        <input class="np-name" id="npName" placeholder="세트 이름">
      </div>
      <button class="np-create" onclick="createPreset()">세트 만들기</button>
    </div>`;
  } else html+=`<button class="new-preset-btn" onclick="peShowNew=true;renderPE()">＋ 새 세트 추가</button>`;
  document.getElementById('peBody').innerHTML=html;
}
function togglePE(id){peExpanded[id]=!peExpanded[id];renderPE();}
function deletePreset(id){if(!confirm('이 세트를 삭제할까요?'))return;presets=presets.filter(p=>p.id!==id);savePresets();renderPE();}
function addPI(id){
  const inp=document.getElementById('pi_'+id);if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const p=presets.find(x=>x.id===id);if(!p||p.items.includes(text))return;
  p.items.push(text);savePresets();peExpanded[id]=true;renderPE();
}
function removePI(id,idx){const p=presets.find(x=>x.id===id);if(!p)return;p.items.splice(idx,1);savePresets();peExpanded[id]=true;renderPE();}
function createPreset(){
  const icon=document.getElementById('npIcon').value.trim()||'📦';
  const name=document.getElementById('npName').value.trim();if(!name)return;
  presets.push({id:'c_'+Date.now(),icon,name,items:[]});savePresets();peShowNew=false;renderPE();
}

showCal();
</script>
</body>
</html>
